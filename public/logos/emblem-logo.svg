<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F5B800"/>
    </radialGradient>
    <radialGradient id="shine" cx="38%" cy="32%" r="40%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#C8960A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#E5A800" stroke-width="4"/>

  <!-- Main yellow circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <circle cx="100" cy="100" r="90" fill="url(#shine)"/>

  <!-- ✦ symbol -->
  <text x="100" y="100" text-anchor="middle" dominant-baseline="central" font-size="80" fill="#FFFFFF" opacity="0.95">✦</text>

  <!-- Subtle inner ring -->
  <circle cx="100" cy="100" r="70" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>
</svg>
