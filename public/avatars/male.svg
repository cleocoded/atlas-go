<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 360" width="200" height="360">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFCBA4"/>
      <stop offset="100%" stop-color="#F0A070"/>
    </radialGradient>
    <radialGradient id="eye-l" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="100%" stop-color="#3d2e8a"/>
    </radialGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a5e"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="pants" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2a4e"/>
      <stop offset="100%" stop-color="#0f1a30"/>
    </linearGradient>
  </defs>

  <!-- Body shadow / base -->
  <ellipse cx="100" cy="345" rx="55" ry="10" fill="rgba(0,0,0,0.2)"/>

  <!-- Legs -->
  <rect x="68" y="240" width="28" height="100" rx="10" fill="url(#pants)"/>
  <rect x="104" y="240" width="28" height="100" rx="10" fill="url(#pants)"/>

  <!-- Shoes -->
  <ellipse cx="82" cy="340" rx="20" ry="9" fill="#1a1a2e"/>
  <ellipse cx="118" cy="340" rx="20" ry="9" fill="#1a1a2e"/>
  <rect x="62" y="333" width="40" height="10" rx="4" fill="#252540"/>
  <rect x="98" y="333" width="40" height="10" rx="4" fill="#252540"/>

  <!-- Jacket body -->
  <path d="M55 180 Q45 195 40 250 L160 250 Q155 195 145 180 Q130 165 100 160 Q70 165 55 180Z" fill="url(#jacket)"/>

  <!-- Jacket lapels -->
  <path d="M100 160 L80 185 L100 190 Z" fill="#FFB84D" opacity="0.9"/>
  <path d="M100 160 L120 185 L100 190 Z" fill="#FFB84D" opacity="0.9"/>

  <!-- Jacket collar -->
  <path d="M80 165 Q90 155 100 160 Q110 155 120 165 L115 180 Q100 170 85 180 Z" fill="#3a3a6e"/>

  <!-- Pocket & button details -->
  <rect x="65" y="205" width="22" height="16" rx="3" fill="#3a3a6e" opacity="0.7"/>
  <circle cx="100" cy="210" r="3" fill="#5a5a9e"/>
  <circle cx="100" cy="222" r="3" fill="#5a5a9e"/>
  <circle cx="100" cy="234" r="3" fill="#5a5a9e"/>

  <!-- Arms -->
  <path d="M55 180 Q30 195 28 235 Q32 245 42 248 Q55 220 65 195 Z" fill="url(#jacket)"/>
  <path d="M145 180 Q170 195 172 235 Q168 245 158 248 Q145 220 135 195 Z" fill="url(#jacket)"/>

  <!-- Hands -->
  <ellipse cx="35" cy="248" rx="14" ry="11" fill="url(#skin)"/>
  <ellipse cx="165" cy="248" rx="14" ry="11" fill="url(#skin)"/>

  <!-- Neck -->
  <rect x="88" y="145" width="24" height="22" rx="8" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="100" cy="115" rx="48" ry="52" fill="url(#skin)"/>

  <!-- Ears -->
  <ellipse cx="52" cy="115" rx="10" ry="14" fill="url(#skin)"/>
  <ellipse cx="148" cy="115" rx="10" ry="14" fill="url(#skin)"/>
  <!-- Inner ear -->
  <ellipse cx="52" cy="115" rx="6" ry="9" fill="#F0A070"/>
  <ellipse cx="148" cy="115" rx="6" ry="9" fill="#F0A070"/>

  <!-- Hair (dark, spiky anime style) -->
  <ellipse cx="100" cy="78" rx="50" ry="32" fill="#1a1025"/>
  <path d="M55 85 Q50 55 70 45 Q80 65 75 85 Z" fill="#1a1025"/>
  <path d="M145 85 Q150 55 130 45 Q120 65 125 85 Z" fill="#1a1025"/>
  <path d="M85 68 Q90 45 100 42 Q110 45 115 68 Z" fill="#241530"/>
  <!-- Hair highlight -->
  <ellipse cx="85" cy="72" rx="12" ry="8" fill="#3d2e5a" opacity="0.7"/>

  <!-- Eyebrows -->
  <path d="M72 98 Q83 93 94 97" fill="none" stroke="#1a1025" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M106 97 Q117 93 128 98" fill="none" stroke="#1a1025" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Eyes -->
  <ellipse cx="83" cy="110" rx="13" ry="14" fill="white"/>
  <ellipse cx="117" cy="110" rx="13" ry="14" fill="white"/>
  <ellipse cx="84" cy="111" rx="9" ry="10" fill="url(#eye-l)"/>
  <ellipse cx="118" cy="111" rx="9" ry="10" fill="url(#eye-l)"/>
  <!-- Pupils -->
  <ellipse cx="85" cy="112" rx="5" ry="6" fill="#1a1025"/>
  <ellipse cx="119" cy="112" rx="5" ry="6" fill="#1a1025"/>
  <!-- Eye shine -->
  <circle cx="87" cy="108" r="2.5" fill="white"/>
  <circle cx="121" cy="108" r="2.5" fill="white"/>
  <!-- Eyelashes -->
  <path d="M70 104 Q83 100 96 104" fill="none" stroke="#1a1025" stroke-width="2" stroke-linecap="round"/>
  <path d="M104 104 Q117 100 130 104" fill="none" stroke="#1a1025" stroke-width="2" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M97 120 Q100 128 103 120" fill="none" stroke="#d08060" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mouth (slight smile) -->
  <path d="M87 136 Q100 145 113 136" fill="none" stroke="#c07050" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="70" cy="128" rx="12" ry="7" fill="#FFB4A0" opacity="0.35"/>
  <ellipse cx="130" cy="128" rx="12" ry="7" fill="#FFB4A0" opacity="0.35"/>

  <!-- Atlas Go badge on jacket -->
  <circle cx="115" cy="200" r="10" fill="#FFB84D"/>
  <text x="115" y="204" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d0d1a">A</text>
</svg>
