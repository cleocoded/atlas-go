<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 360" width="200" height="360">
  <defs>
    <radialGradient id="skin" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFCBA4"/>
      <stop offset="100%" stop-color="#F0A070"/>
    </radialGradient>
    <radialGradient id="eye-l" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#008060"/>
    </radialGradient>
    <linearGradient id="jacket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a1a5e"/>
      <stop offset="100%" stop-color="#2e0f3e"/>
    </linearGradient>
    <linearGradient id="skirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5a1a6e"/>
      <stop offset="100%" stop-color="#3e0f50"/>
    </linearGradient>
    <linearGradient id="hair-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="100" cy="348" rx="55" ry="10" fill="rgba(0,0,0,0.2)"/>

  <!-- Skirt -->
  <path d="M65 230 Q55 270 50 340 L150 340 Q145 270 135 230 Z" fill="url(#skirt)"/>
  <!-- Skirt hem detail -->
  <path d="M50 340 Q75 330 100 338 Q125 330 150 340" fill="none" stroke="#7B68EE" stroke-width="2.5"/>

  <!-- Legs -->
  <rect x="68" y="300" width="22" height="45" rx="8" fill="#F0A070"/>
  <rect x="110" y="300" width="22" height="45" rx="8" fill="#F0A070"/>

  <!-- Shoes / boots -->
  <path d="M60 338 Q68 330 80 332 Q92 334 90 342 Q85 350 68 350 Q55 348 60 338Z" fill="#7B68EE"/>
  <path d="M110 338 Q118 330 130 332 Q142 334 140 342 Q135 350 118 350 Q105 348 110 338Z" fill="#7B68EE"/>
  <!-- Buckle -->
  <rect x="72" y="336" width="10" height="5" rx="2" fill="#FFB84D"/>
  <rect x="118" y="336" width="10" height="5" rx="2" fill="#FFB84D"/>

  <!-- Jacket/top body -->
  <path d="M58 178 Q48 195 44 240 L156 240 Q152 195 142 178 Q128 162 100 158 Q72 162 58 178Z" fill="url(#jacket)"/>

  <!-- Bow tie / collar accent -->
  <path d="M88 165 L100 175 L112 165 L105 178 L100 172 L95 178 Z" fill="#FFB84D"/>

  <!-- Belt -->
  <rect x="44" y="232" width="112" height="10" rx="4" fill="#5a1a6e"/>
  <rect x="93" y="233" width="14" height="8" rx="3" fill="#FFB84D"/>

  <!-- Arms -->
  <path d="M58 178 Q35 192 30 228 Q34 238 44 240 Q56 218 66 195 Z" fill="url(#jacket)"/>
  <path d="M142 178 Q165 192 170 228 Q166 238 156 240 Q144 218 134 195 Z" fill="url(#jacket)"/>

  <!-- Hands -->
  <ellipse cx="37" cy="242" rx="13" ry="11" fill="url(#skin)"/>
  <ellipse cx="163" cy="242" rx="13" ry="11" fill="url(#skin)"/>

  <!-- Neck -->
  <rect x="89" y="146" width="22" height="20" rx="7" fill="url(#skin)"/>

  <!-- Head -->
  <ellipse cx="100" cy="112" rx="46" ry="50" fill="url(#skin)"/>

  <!-- Ears -->
  <ellipse cx="54" cy="112" rx="10" ry="13" fill="url(#skin)"/>
  <ellipse cx="146" cy="112" rx="10" ry="13" fill="url(#skin)"/>
  <ellipse cx="54" cy="112" rx="6" ry="8" fill="#F0A070"/>
  <ellipse cx="146" cy="112" rx="6" ry="8" fill="#F0A070"/>
  <!-- Earrings -->
  <circle cx="54" cy="124" r="4" fill="#FFB84D"/>
  <circle cx="146" cy="124" r="4" fill="#FFB84D"/>

  <!-- Hair - long with side bangs, pink/rose -->
  <!-- Back hair -->
  <path d="M54 90 Q50 140 55 200 Q70 220 85 215 Q90 165 88 110 Z" fill="url(#hair-grad)"/>
  <path d="M146 90 Q150 140 145 200 Q130 220 115 215 Q110 165 112 110 Z" fill="url(#hair-grad)"/>
  <!-- Top of hair -->
  <ellipse cx="100" cy="76" rx="48" ry="30" fill="url(#hair-grad)"/>
  <!-- Bangs/fringe -->
  <path d="M55 90 Q65 65 80 72 Q88 80 82 95 Z" fill="url(#hair-grad)"/>
  <path d="M145 90 Q135 65 120 72 Q112 80 118 95 Z" fill="url(#hair-grad)"/>
  <path d="M75 76 Q88 55 100 52 Q112 55 125 76 Q112 70 100 68 Q88 70 75 76Z" fill="#ff6b9d"/>
  <!-- Hair highlights -->
  <ellipse cx="88" cy="68" rx="14" ry="7" fill="#ffafc5" opacity="0.5"/>
  <!-- Hair clip -->
  <rect x="118" y="80" width="18" height="8" rx="4" fill="#FFB84D"/>
  <circle cx="127" cy="84" r="4" fill="#FFE066"/>

  <!-- Eyebrows (thinner, arched) -->
  <path d="M72 96 Q83 90 94 94" fill="none" stroke="#8B3a3a" stroke-width="3" stroke-linecap="round"/>
  <path d="M106 94 Q117 90 128 96" fill="none" stroke="#8B3a3a" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes (bigger, sparkly) -->
  <ellipse cx="83" cy="108" rx="14" ry="15" fill="white"/>
  <ellipse cx="117" cy="108" rx="14" ry="15" fill="white"/>
  <ellipse cx="83" cy="109" rx="10" ry="11" fill="url(#eye-l)"/>
  <ellipse cx="117" cy="109" rx="10" ry="11" fill="url(#eye-l)"/>
  <!-- Pupils -->
  <ellipse cx="83" cy="110" rx="5.5" ry="6.5" fill="#0a2a1a"/>
  <ellipse cx="117" cy="110" rx="5.5" ry="6.5" fill="#0a2a1a"/>
  <!-- Eye shine (sparkle) -->
  <circle cx="85" cy="105" r="3" fill="white"/>
  <circle cx="119" cy="105" r="3" fill="white"/>
  <circle cx="80" cy="113" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="114" cy="113" r="1.5" fill="white" opacity="0.6"/>
  <!-- Eyelashes (long) -->
  <path d="M69 102 Q83 97 97 102" fill="none" stroke="#8B3a3a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M103 102 Q117 97 131 102" fill="none" stroke="#8B3a3a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lower lash -->
  <path d="M70 117 Q83 122 96 117" fill="none" stroke="#8B3a3a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M104 117 Q117 122 130 117" fill="none" stroke="#8B3a3a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Nose -->
  <path d="M97 119 Q100 127 103 119" fill="none" stroke="#d08060" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Mouth (smile with lip color) -->
  <path d="M87 135 Q100 146 113 135" fill="#FFB4A0" opacity="0.7"/>
  <path d="M87 135 Q100 146 113 135" fill="none" stroke="#c07050" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cupid's bow -->
  <path d="M90 133 Q95 129 100 133 Q105 129 110 133" fill="none" stroke="#c07050" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="68" cy="124" rx="13" ry="8" fill="#FFB4A0" opacity="0.4"/>
  <ellipse cx="132" cy="124" rx="13" ry="8" fill="#FFB4A0" opacity="0.4"/>

  <!-- Atlas Go badge -->
  <circle cx="85" cy="200" r="10" fill="#00E5A0"/>
  <text x="85" y="204" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0d0d1a">A</text>
</svg>
